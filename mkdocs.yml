yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

# Project information
site_name: 基岩文档
site_url: https://miemiemethod.github.io/bedrock-docs/
edit_uri: edit/main/docs/
site_description: Minecraft基岩版开发文档

# Repository
repo_name: GitHub
repo_url: https://github.com/MiemieMethod/bedrock-docs

# Copyright
copyright: >
  Copyright &copy; 2024 Miemie Method & LPaicen – <a href="#__consent">更改Cookie设置</a> – 除非另有声明，本站内容采用<a rel="license" href="http://creativecommons.org/licenses/by-nc-sa/4.0/"><img alt="Creative Commons License" style="border-width:0;vertical-align: text-bottom;" src="/bedrock-docs/assets/images/by-nc-sa.svg" />知识共享署名-非商业性使用-相同方式共享</a>授权，附加条款亦可能应用。

# Configuration
theme:
  name: material
  language: zh
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: 切换至浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/toggle-switch-off
        name: 切换至系统偏好
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.tabs
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.tooltips
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.footnote.tooltips

# Hooks
hooks:
  - overrides/hooks/shortcodes.py
  - overrides/hooks/wikilink.py
  - overrides/hooks/abbr.py
  - overrides/hooks/templates.py

# Watch
watch:
  - includes

# Additional configuration
extra:
  status:
    new: 最近添加
    deprecated: 已弃用
  analytics:
    provider: google
    property: G-5E7Q5MKZZ8
    feedback:
      title: 本页是否有帮助？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 帮大忙了
          data: 1
          note: >-
            感谢您的反馈！
        - icon: material/emoticon-sad-outline
          name: 改需改进
          data: 0
          note: >- 
            感谢您的反馈！或许您可以通过进一步填写<a href="https://www.wjx.cn/vm/QGP4l7k.aspx" target="_blank" rel="noopener">反馈问卷</a>来帮助我们改进。
  consent:
    title: 同意Cookie
    description: >- 
      我们利用Cookie来记住您的访问记录和喜好，同时也用来评估我们的文档是否有效，以及用户是否能找到他们想要的信息。如果您同意，那么您就是在帮助我们不断优化我们的文档，非常感谢！<small>您随时可以在页面底部更改您的Cookie设置。</small>
    cookies:
      analytics:
        name: Google分析
        checked: true
      github:
        name: GitHub
        checked: true
    actions:
      - accept
      - manage
      - reject
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MiemieMethod/bedrock-docs
extra_css:
  - assets/stylesheets/fonts.css
  - assets/stylesheets/code.css
  - assets/stylesheets/banner.css
  - assets/stylesheets/keys.css
  - assets/stylesheets/magiclink.css
  - assets/stylesheets/progressbar.css
  - assets/stylesheets/admonition.css
  - assets/stylesheets/badge.css
  - assets/stylesheets/tabbed.css
  - assets/stylesheets/treeview.css
extra_javascript:
  - assets/javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/uml.js
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js
  # - assets/javascripts/tablesort.js
  # - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/javascripts/viz-standalone.js
  - assets/javascripts/viz.js
  - assets/javascripts/navbar.js # navbar label position fix

# Plugins
plugins:
  - search
  - social
  - blog:
      post_excerpt_separator: <more/>
  - rss
  - tags
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - git-committers:
      repository: MiemieMethod/bedrock-docs
      branch: main
  - glightbox:
       skip_classes:
         - skip-image
       auto_caption: true
       background: gainsboro
  - typeset

# Extensions
markdown_extensions:
  - abbr
  # - admonition
  - attr_list
  # - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: 该段落的引用链接
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - tables
  - smarty:
      smart_quotes: false
  # - wikilinks:
  #     base_url: https://wiki.mcbe-dev.net/p/
  #     build_url: !!python/name:tools.wikilink_parser.wiki_url_builder
  - pymdownx.arithmatex:
      generic: true
      block_tag: 'pre'
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  # - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.highlight:
      pygments_lang_class: true
      # auto_title: true
      linenums_style: pymdownx-inline
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite:
      custom_inline:
        - name: math
          class: arithmatex
          format: !!python/object/apply:pymdownx.arithmatex.arithmatex_inline_format {kwds: {mode: generic}}
  - pymdownx.superfences:
      preserve_tabs: true
      custom_fences:
        # Mermaid diagrams
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: math
          class: arithmatex
          format: !!python/object/apply:pymdownx.arithmatex.arithmatex_fenced_format {kwds: {mode: generic, tag: pre}}
        - name: md-render
          class: md-render
          format: !!python/name:tools.pymdownx_md_render.md_sub_render
        - name: viz
          class: viz
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.keys:
      separator: "\uff0b"
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
      dedent_subsections: true
      base_path: 'includes/'
      auto_append:
        - abbreviations.md
        - glossaries.md
  # - pymdownx.tabbed:
  #     alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tools.collapse_code:
      expand_text: ''
      collapse_text: ''
      expand_title: '展开'
      collapse_title: '收起'
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shorthand: true
      social_url_shortener: true
      user: MiemieMethod
      repo: bedrock-docs
      normalize_issue_symbols: true
      labels:
        commit: '提交'
        compare: '比较'
        issue: '议题'
        pull: '拉取请求'
        mention: '用户'
        repository: '仓库'
        discuss: '讨论'
  - pymdownx.smartsymbols
  - pymdownx.escapeall:
      hardbreak: true
      nbsp: true
  - pymdownx.progressbar
  - pymdownx.striphtml
  - pymdownx.saneheaders
  - pymdownx.blocks.admonition:
      types:
      - name: new
        class: new
        title: 新功能
      - name: settings
        class: settings
        title: 设置
      - name: note
        class: note
        title: 注意
      - name: abstract
        class: abstract
        title: 摘要
      - name: info
        class: info
        title: 信息
      - name: tip
        class: tip
        title: 提示
      - name: success
        class: success
        title: 成功
      - name: question
        class: question
        title: 问题
      - name: warning
        class: warning
        title: 警告
      - name: failure
        class: failure
        title: 失败
      - name: danger
        class: danger
        title: 危险
      - name: bug
        class: bug
        title: 漏洞
      - name: example
        class: example
        title: 示例
      - name: quote
        class: quote
        title: 引用
  - pymdownx.blocks.details:
      types:
      - name: details-new
        class: new
        title: 新功能
      - name: details-settings
        class: settings
        title: 设置
      - name: details-note
        class: note
        title: 注意
      - name: details-abstract
        class: abstract
        title: 摘要
      - name: details-info
        class: info
        title: 信息
      - name: details-tip
        class: tip
        title: 提示
      - name: details-success
        class: success
        title: 成功
      - name: details-question
        class: question
        title: 问题
      - name: details-warning
        class: warning
        title: 警告
      - name: details-failure
        class: failure
        title: 失败
      - name: details-danger
        class: danger
        title: 危险
      - name: details-bug
        class: bug
        title: 漏洞
      - name: details-example
        class: example
        title: 示例
      - name: details-quote
        class: quote
        title: 引用
  - pymdownx.blocks.html:
  - pymdownx.blocks.definition:
  - pymdownx.blocks.tab:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.blocks.caption
  - pymdownx.fancylists

